{% extends "base.html" %}

{% block body %}
<section>
  <h2 class="section-title">Search</h2>
  <div class="section-body search-body">
    <div class="search command">
      <label class="prog" for="search-input">man -k</label>
      <input id="search-input" type="search" autocomplete="off" placeholder="query"/>
    </div>
    <dl class="hl" id="search-results" hidden></dl>
  </div>
</section>

<article class="md">
  {{ section.content | safe }}
</article>

{% set posts = get_section(path="blog/_index.md") %}
{{ page_macros::listing(title="Posts", pages=posts.pages) }}

<section>
  <h2 class="section-title">Feed</h2>
  <div class="section-body">
    <p class="sh-cmd"><span class="prompt">$</span> <span class="prog">ls</span> <span>feeds/</span></p>
    <div class="tree">
      <div class="tree-dir">feeds/</div>
      <ul>
        <li><a href="{{ get_url(path='atom.xml', trailing_slash=false) }}">atom.xml</a></li>
        <li><a href="{{ get_url(path='rss.xml', trailing_slash=false) }}">rss.xml</a></li>
      </ul>
    </div>
  </div>
</section>
<script defer src="/elasticlunr.min.js"></script>
<script defer src="/js/search.js"></script>
{% endblock body %}
